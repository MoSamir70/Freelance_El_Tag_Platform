<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#060b18">
    <title>منصة التاج – لوحة الطالب القتالية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: radial-gradient(circle at center, #0f192e 0%, #050814 100%);
            color: #f1f5f9;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(6, 11, 24, 0.4) 1px, transparent 1px), linear-gradient(90deg, rgba(6, 11, 24, 0.4) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 0;
        }
        .pubg-panel {
            background: linear-gradient(135deg, rgba(16, 24, 48, 0.85) 0%, rgba(8, 13, 28, 0.9) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(245, 158, 11, 0.25);
            box-shadow: inset 0 0 12px rgba(245, 158, 11, 0.08), 0 8px 32px rgba(0, 0, 0, 0.6);
            border-radius: 14px;
            transition: all 0.25s;
        }
        .pubg-nav-btn {
            position: relative;
            transition: all 0.2s;
            color: #94a3b8;
            font-weight: 700;
        }
        .pubg-nav-btn.active {
            color: #facc15;
            text-shadow: 0 0 8px rgba(250, 204, 21, 0.6);
            transform: scale(1.05);
        }
        .pubg-nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: #facc15;
            border-radius: 2px;
        }
        .lobby-sidebar {
            width: 320px;
            transition: transform 0.3s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 45;
        }
        .lobby-sidebar.collapsed {
            transform: translateX(-100%);
        }
        html[dir="rtl"] .lobby-sidebar.collapsed {
            transform: translateX(100%);
        }
        @media (max-width: 1024px) {
            .lobby-sidebar {
                position: fixed;
                top: 0;
                bottom: 0;
                height: 100vh;
                width: 85%;
                max-width: 330px;
                transform: translateX(-100%);
            }
            .lobby-sidebar.collapsed {
                transform: translateX(-100%);
            }
            .lobby-sidebar.open {
                transform: translateX(0);
            }
        }
        .online-status {
            width: 8px;
            height: 8px;
            background: #06b6d4;
            border-radius: 50%;
            animation: pubgPulse 1.5s infinite;
        }
        @keyframes pubgPulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
        .pubg-btn-primary {
            background: linear-gradient(180deg, #facc15 0%, #d97706 100%);
            color: #050814;
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid #fef08a;
            transition: all 0.2s;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .online-user-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }
        .online-user-card:hover {
            background: rgba(250, 204, 21, 0.1);
            border-color: rgba(250, 204, 21, 0.3);
            transform: translateX(-3px);
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 8px 4px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .leaderboard-row {
            cursor: pointer;
            transition: all 0.15s;
        }
        .leaderboard-row:hover {
            background: rgba(250, 204, 21, 0.1);
        }
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            max-width: calc(100% - 40px);
            background: rgba(10, 15, 30, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(250, 204, 21, 0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-widget.open {
            display: flex;
        }
        .chat-header {
            background: rgba(250, 204, 21, 0.2);
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(250,204,21,0.3);
        }
        .chat-messages {
            height: 250px;
            overflow-y: auto;
            padding: 8px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .chat-input-area {
            display: flex;
            padding: 8px;
            gap: 6px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #facc15, #eab308);
            width: 0%;
        }
    </style>
</head>
<body class="select-none text-slate-200 flex flex-col h-screen">

<script type="module">
    import { initStudentDashboard } from './src/student/dashboard.js';
    initStudentDashboard();

    const Toast = Swal.mixin({
        customClass: { popup: 'bg-slate-900 text-white rounded-2xl border-2 border-amber-500 shadow-2xl' },
        buttonsStyling: false,
        confirmButtonClass: 'pubg-btn-primary text-black px-5 py-2 rounded-lg text-xs font-black',
        cancelButtonClass: 'bg-slate-800 text-white px-5 py-2 rounded-lg text-xs'
    });
    window.Swal = Toast;

    const fullscreenBtn = document.getElementById('fullscreen-btn');
    fullscreenBtn?.addEventListener('click', () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    });
    document.addEventListener('fullscreenchange', () => {
        fullscreenBtn.innerHTML = document.fullscreenElement ? '<i class="fa-solid fa-compress"></i>' : '<i class="fa-solid fa-expand"></i>';
    });

    const sidebar = document.getElementById('lobby-sidebar');
    const toggleSidebarBtn = document.getElementById('toggle-sidebar-btn');
    const collapseSidebarBtn = document.getElementById('collapse-sidebar-btn');
    const isSidebarCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
    if (isSidebarCollapsed && window.innerWidth >= 1024) {
        sidebar.classList.add('collapsed');
    }
    const toggleSidebar = () => {
        sidebar.classList.toggle('collapsed');
        localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
    };
    toggleSidebarBtn?.addEventListener('click', toggleSidebar);
    collapseSidebarBtn?.addEventListener('click', toggleSidebar);

    const mobileToggle = document.getElementById('mobile-menu-toggle');
    const overlay = document.getElementById('overlay-blur');
    const closeMobile = document.getElementById('close-mobile-panel');
    const openSidebar = () => { sidebar.classList.add('open'); overlay.classList.remove('hidden'); document.body.style.overflow = 'hidden'; };
    const closeSidebar = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); document.body.style.overflow = ''; };
    mobileToggle?.addEventListener('click', openSidebar);
    closeMobile?.addEventListener('click', closeSidebar);
    overlay?.addEventListener('click', closeSidebar);

    const navBtns = document.querySelectorAll('.pubg-nav-btn');
    const panels = document.querySelectorAll('.student-tab-panel');
    navBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            navBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            panels.forEach(panel => {
                panel.classList.toggle('hidden', panel.id !== `student-tab-${tab}`);
            });
            window.dispatchEvent(new CustomEvent('studentTabChanged', { detail: { tab } }));
        });
    });

    const syncSideTab = (val) => {
        document.querySelectorAll('.side-tab-btn').forEach(btn => {
            const active = btn.dataset.sideTab === val;
            btn.classList.toggle('active', active);
            if(active) btn.classList.add('bg-amber-500', 'text-black');
            else btn.classList.remove('bg-amber-500', 'text-black');
        });
        document.getElementById('side-tab-title').innerText = val === 'classmates' ? 'زملاء الكتيبة' : 'كل المقاتلين';
        window.dispatchEvent(new CustomEvent('sideTabChanged', { detail: { tab: val } }));
    };
    document.querySelectorAll('.side-tab-btn').forEach(btn => {
        btn.addEventListener('click', () => syncSideTab(btn.dataset.sideTab));
    });

    const searchInput = document.getElementById('search-friends-input');
    const triggerSearch = (val) => {
        const list = document.getElementById('online-users-list');
        if (!list) return;
        const term = val.toLowerCase();
        Array.from(list.children).forEach(el => {
            const name = el.querySelector('.font-medium')?.innerText.toLowerCase() || '';
            el.style.display = name.includes(term) ? 'flex' : 'none';
        });
    };
    searchInput?.addEventListener('input', (e) => triggerSearch(e.target.value));
    window.triggerSearch = triggerSearch;

    window.updateOnlineUsersUI = (html) => {
        const target = document.getElementById('online-users-list');
        if (target) target.innerHTML = html;
        if (searchInput?.value) triggerSearch(searchInput.value);
        document.querySelectorAll('.msg-icon:not(#global-msg-icon)').forEach(icon => {
            icon.removeEventListener('click', window.handleMessageIcon);
            icon.addEventListener('click', window.handleMessageIcon);
        });
    };

    const updateHeaderStats = () => {
        const score = document.getElementById('student-dashboard-score')?.innerText || '0';
        const wins = document.getElementById('student-wins')?.innerText || '0';
        document.getElementById('student-top-score') && (document.getElementById('student-top-score').innerText = score);
        document.getElementById('student-top-wins') && (document.getElementById('student-top-wins').innerText = wins);
    };
    const observer = new MutationObserver(updateHeaderStats);
    const profilePanel = document.getElementById('student-tab-profile');
    if(profilePanel) observer.observe(profilePanel, { childList: true, subtree: true, characterData: true });
    updateHeaderStats();
</script>
</body>
</html>
