<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>الساحة العالمية - منصة التاج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * { 
            font-family: 'Cairo', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        body { 
            background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 100%);
            min-height: 100vh;
        }
        /* تأثير الزجاج الاحترافي */
        .glass-card { 
            background: rgba(30, 41, 59, 0.45); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        /* حالة التبويب النشط */
        .tab-active { 
            background: linear-gradient(to bottom, rgba(250, 204, 21, 0.15), rgba(250, 204, 21, 0.02)); 
            color: #facc15; 
            border-bottom: 3px solid #facc15; 
        }
        .tab-inactive { 
            color: #94a3b8; 
        }
        .tab-inactive:hover {
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.02);
        }
        /* القائمة السفلية للهواتف */
        .bottom-nav { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08); 
            padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
            z-index: 50; 
        }
        .bottom-nav button { 
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 0.25rem; 
            font-size: 0.75rem; 
            font-weight: 500;
            transition: all 0.2s ease-in-out; 
        }
        .bottom-nav i { 
            font-size: 1.3rem; 
            margin-bottom: 0.25rem; 
            transition: transform 0.2s ease;
        }
        .bottom-nav button:active i {
            transform: scale(0.9);
        }
        /* حاوية المحتوى الرئيسي */
        .content-area { 
            padding-bottom: calc(90px + env(safe-area-inset-bottom)); 
        }
        
        /* شاشات سطح المكتب والتابلت */
        @media (min-width: 768px) {
            .bottom-nav { display: none; }
            .desktop-tabs { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem; }
            .content-area { padding-bottom: 2rem; }
        }
        /* شاشات الهواتف */
        @media (max-width: 767px) {
            .desktop-tabs { display: none; }
        }
    </style>
</head>
<body class="text-slate-100 antialiased flex flex-col min-h-screen">

    <header class="flex justify-between items-center px-4 py-3 md:px-6 md:py-4 glass-card sticky top-0 z-50 shadow-lg shadow-black/10">
        <div class="flex items-center gap-3">
            <div class="bg-yellow-400/10 p-2 rounded-xl border border-yellow-400/20">
                <i class="fas fa-globe-asia text-yellow-400 text-xl md:text-2xl animate-pulse"></i>
            </div>
            <h1 class="text-lg md:text-xl font-black tracking-wide bg-gradient-to-l from-white to-gray-300 bg-clip-text text-transparent">الساحة العالمية</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div id="user-name" class="text-sm font-medium text-slate-300 hidden md:flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/5">
                <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                <span>مرحباً، ...</span>
            </div>
            <button id="logout-btn" class="bg-red-500/20 hover:bg-red-500 text-red-400 hover:text-white px-4 py-2 rounded-xl text-sm font-bold border border-red-500/30 hover:border-transparent transition-all duration-300 flex items-center gap-2 shadow-sm shadow-red-900/20">
                <i class="fas fa-sign-out-alt"></i> 
                <span>خروج</span>
            </button>
        </div>
    </header>

    <nav id="desktop-tabs" class="desktop-tabs px-4 pt-6 max-w-4xl mx-auto w-full"></nav>

    <main class="flex-grow">
        <div id="app" class="content-area container mx-auto px-4 py-4 md:py-6 max-w-7xl animate-fade-in">
            </div>
    </main>

    <nav id="bottom-nav" class="bottom-nav flex shadow-2xl shadow-black"></nav>

    <script type="module">
        // ✅ فحص صلاحية الدخول إلى الساحة العالمية قبل تحميل أي شيء
        import { getCurrentUserInfo } from './src/firebase/auth.js';
        import { canAccessGlobalArena } from './src/services/subscriptionGuard.js';
        
        async function checkAccessAndLoad() {
            try {
                const user = await getCurrentUserInfo();
                if (!user) {
                    window.location.href = 'index.html';
                    return;
                }
                
                const canAccess = await canAccessGlobalArena(user.id, !user.isTeacher);
                if (!canAccess) {
                    // عرض رسالة منع الوصول
                    await Swal.fire({
                        title: '🚫 غير مسموح',
                        html: '❌ الباقة المجانية لا تسمح بدخول الساحة العالمية.<br>يرجى ترقية اشتراكك للاستفادة من هذه الميزة.',
                        icon: 'error',
                        confirmButtonText: 'العودة إلى المنصة',
                        background: '#0f172a',
                        color: '#fff'
                    });
                    // التوجيه إلى الصفحة الرئيسية
                    if (user.isTeacher) {
                        window.location.href = 'platform.html';
                    } else {
                        window.location.href = 'platform.html?student=true';
                    }
                    return;
                }
                
                // إذا كان مسموحاً، نبدأ تشغيل الساحة
                await import('./src/arena/index.js');
            } catch (err) {
                console.error('خطأ في فحص الصلاحية:', err);
                window.location.href = 'index.html';
            }
        }
        
        checkAccessAndLoad();
    </script>
</body>
</html>
