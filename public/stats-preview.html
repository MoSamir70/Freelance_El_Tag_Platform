<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>مركز القيادة والتحليلات الذكي | منصة التاج</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════════════════════════
       1. نظام التصميم والمتغيرات (Design System & Variables)
       ═══════════════════════════════════════════════════════════════ */
    :root {
      --bg-gradient: linear-gradient(135deg, #050917 0%, #0b1630 100%);
      --panel-bg: rgba(10, 20, 45, 0.92);
      --panel-border: rgba(124, 58, 237, 0.3);
      --panel-hover: rgba(124, 58, 237, 0.18);
      --text-main: #edf2ff;
      --text-muted: #a4b0cb;
      --primary: #7c3aed;
      --primary-glow: rgba(124, 58, 237, 0.65);
      --secondary: #38bdf8;
      --accent: #60a5fa;
      --success: #22c55e;
      --danger: #f97316;
      --warning: #facc15;
      --sidebar-width: 280px;
      --sidebar-collapsed: 80px;
      --blur-val: 22px;
      --solid-bg: #081325; 
    }

    body.light {
      --bg-gradient: linear-gradient(135deg, #eaf2fb 0%, #dbe7f2 100%);
      --panel-bg: rgba(220, 234, 251, 0.92);
      --panel-border: rgba(56, 100, 170, 0.16);
      --panel-hover: rgba(59, 130, 246, 0.12);
      --text-main: #10263b;
      --text-muted: #4f6178;
      --primary: #2563eb;
      --primary-glow: rgba(59, 130, 246, 0.4);
      --secondary: #0f8ba6;
      --accent: #4f46e5;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #ca8a04;
      --solid-bg: #f6fbff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    /* ═══════════════════════════════════════════════════════════════
       2. المؤثرات الخلفية الديناميكية (Dynamic Backgrounds)
       ═══════════════════════════════════════════════════════════════ */
    .bg-orbs {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; overflow: hidden; pointer-events: none;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15;
      animation: orbFloat 20s infinite alternate ease-in-out;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -10%; left: -10%; }
    .orb-2 { width: 500px; height: 500px; background: var(--secondary); bottom: -15%; right: -10%; animation-delay: -5s; }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 40px) scale(1.2); }
    }

    /* ═══════════════════════════════════════════════════════════════
       3. الهيكل الرئيسي وعناصر الواجهة (Main Layout)
       ═══════════════════════════════════════════════════════════════ */
    .app-container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--panel-bg);
      backdrop-filter: blur(var(--blur-val));
      border-left: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: fixed;
      height: 100vh;
      z-index: 100;
    }

    .sidebar.collapsed { width: var(--sidebar-collapsed); }
    .sidebar-header { padding: 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--panel-border); }
    .logo-zone { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.2rem; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }
    .sidebar.collapsed .logo-text { display: none; }
    
    .collapse-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; transition: color 0.2s; }
    .collapse-btn:hover { color: var(--primary); }

    .nav-tabs { list-style: none; padding: 16px 8px; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; overflow-y: auto; }
    .tab-btn { display: flex; align-items: center; gap: 14px; padding: 12px 22px; color: var(--text-muted); text-decoration: none; border-radius: 999px; cursor: pointer; font-weight: 500; transition: all 0.3s ease; position: relative; overflow: hidden; }
    .tab-btn i { font-size: 1.2rem; width: 24px; text-align: center; color: transparent; background: linear-gradient(145deg, #8b5cf6, #06b6d4); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tab-btn:hover, .tab-btn.active { color: var(--text-main); }
    .tab-btn::before { content: ''; position: absolute; inset: 0; border-radius: 999px; background: transparent; transition: all 0.3s ease; }
    .tab-btn.active::before { background: linear-gradient(135deg, rgba(124,58,237,0.18), rgba(14,165,233,0.12)); box-shadow: inset 0 0 30px rgba(124,58,237,0.25); }
    .tab-btn:hover::before { background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(168,85,247,0.08)); }
    .sidebar.collapsed .tab-text { display: none; }

    .main-content { flex-grow: 1; margin-right: var(--sidebar-width); padding: 32px; transition: margin-right 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .sidebar.collapsed + .main-content { margin-right: var(--sidebar-collapsed); }

    .toolbar { display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); backdrop-filter: blur(var(--blur-val)); border: 1px solid var(--panel-border); padding: 16px 24px; border-radius: 16px; margin-bottom: 32px; }
    .toolbar-actions { display: flex; align-items: center; gap: 16px; }
    .action-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: var(--text-main); padding: 10px 18px; border-radius: 999px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 10px; transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease; box-shadow: 0 0 0 rgba(59,130,246,0); }
    .action-btn:hover { background: rgba(59,130,246,0.16); border-color: rgba(59,130,246,0.3); box-shadow: 0 0 18px rgba(59,130,246,0.2); transform: translateY(-1px); }
    .action-btn:active { transform: scale(0.98); }
    .btn-exit { background: rgba(248,113,113,0.16); border-color: rgba(248,113,113,0.25); color: var(--danger); }
    .btn-exit:hover { background: var(--danger); color: #fff; }

    /* ═══════════════════════════════════════════════════════════════
       4. قوالب وعناصر اللوحات التحليلية (UI Components)
       ═══════════════════════════════════════════════════════════════ */
    .grid-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .kpi-card { background: var(--panel-bg); backdrop-filter: blur(var(--blur-val)); border: 1px solid rgba(255,255,255,0.08); padding: 26px; border-radius: 24px; display: flex; align-items: center; justify-content: space-between; transition: transform 0.35s ease, box-shadow 0.35s ease; box-shadow: inset 0 0 1px rgba(255,255,255,0.08), 0 20px 40px rgba(0,0,0,0.12); }
    .kpi-card:hover { transform: translateY(-8px); box-shadow: inset 0 0 18px rgba(124,58,237,0.12), 0 28px 50px rgba(0,0,0,0.16); }
    .kpi-info h6 { font-size: 0.95rem; display: block; margin-bottom: 8px; color: transparent; background: linear-gradient(135deg, #8b5cf6, #06b6d4); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .kpi-value { font-size: 1.9rem; font-weight: 900; letter-spacing: -0.03em; }
    .kpi-icon { font-size: 2.4rem; opacity: 0.98; color: transparent; background: linear-gradient(145deg, #8b5cf6, #06b6d4); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 15px rgba(59,130,246,0.25); }

    .dashboard-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
    .glass-panel { background: var(--panel-bg); backdrop-filter: blur(var(--blur-val)); border: 1px solid var(--panel-border); padding: 24px; border-radius: 28px; margin-bottom: 24px; transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .glass-panel:hover { transform: translateY(-4px); box-shadow: 0 20px 45px rgba(0,0,0,0.14); }
    .panel-header { font-size: 1.15rem; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 14px; color: transparent; background: linear-gradient(135deg, #8b5cf6, #06b6d4); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .chart-container { width: 100%; height: 320px; }

    .filter-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-chip { padding: 10px 18px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 999px; cursor: pointer; font-size: 0.88rem; font-weight: 700; color: var(--text-main); transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06); }
    .filter-chip.active, .filter-chip:hover { background: linear-gradient(135deg, rgba(124,58,237,0.18), rgba(14,165,233,0.14)); color: #fff; border-color: rgba(124,58,237,0.3); transform: translateY(-1px); }

    /* شبكة الطلاب المطورة */
    .students-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 22px; }
    .student-card { background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 24px; text-align: center; transition: transform 0.35s ease, box-shadow 0.35s ease; position: relative; cursor: pointer; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 18px 40px rgba(0,0,0,0.12); }
    .student-card:hover { border-color: rgba(124, 58, 237, 0.35); transform: translateY(-8px) rotateX(1deg) rotateY(-1deg); box-shadow: 0 24px 50px rgba(0,0,0,0.18), inset 0 0 0 1px rgba(124,58,237,0.08); }
    .student-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .student-avatar { width: 82px; height: 82px; margin: 0 auto; border-radius: 50%; background: linear-gradient(135deg, rgba(124,58,237,0.95), rgba(14,165,233,0.95)); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; font-weight: 800; border: 4px solid rgba(255,255,255,0.18); box-shadow: 0 0 22px rgba(59,130,246,0.3); position: relative; }
    .student-avatar::after { content: ''; position: absolute; inset: 6px; border-radius: 50%; box-shadow: inset 0 0 20px rgba(255,255,255,0.18); }
    
    .student-name { font-weight: 800; font-size: 1.24rem; margin-top: 14px; color: var(--text-main); }
    .student-grade { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 16px; }
    
    /* تفاصيل أداء الطالب في البطاقة */
    .student-stats-row { display: flex; justify-content: space-between; gap: 10px; background: rgba(255,255,255,0.05); padding: 14px 16px; border-radius: 16px; margin-bottom: 16px; font-size: 0.85rem; }
    .student-stats-row div { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .student-stats-row span:first-child { color: var(--text-muted); font-size: 0.75rem; }
    .student-stats-row span:last-child { font-weight: 800; }

    /* أشرطة التقدم داخل بطاقة الطالب */
    .progress-wrapper { margin-top: auto; text-align: right; }
    .progress-label { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; }
    .progress-bar { background: rgba(255,255,255,0.06); height: 10px; border-radius: 999px; overflow: hidden; width: 100%; box-shadow: inset 0 2px 5px rgba(0,0,0,0.25); }
    .progress-fill { height: 100%; border-radius: 999px; transition: width 0.9s cubic-bezier(0.22,1,0.36,1); box-shadow: 0 0 20px rgba(59,130,246,0.25); }

    .trend-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 8px; font-size: 0.85rem; font-weight: 800; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    .trend-up { background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(16, 185, 129, 0.1)); border: 1px solid rgba(16, 185, 129, 0.4); color: var(--success); }
    .trend-down { background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1)); border: 1px solid rgba(239, 68, 68, 0.4); color: var(--danger); }

    .interactive-list { display: flex; flex-direction: column; gap: 12px; }
    .list-item { background: rgba(255,255,255,0.03); border: 1px solid var(--panel-border); padding: 14px 20px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
    .list-item:hover { background: var(--panel-hover); cursor: pointer; border-color: var(--primary); }

    .top-progress { position: fixed; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #8b5cf6, #06b6d4); width: 0%; z-index: 1000; box-shadow: 0 0 18px rgba(59,130,246,0.45); transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1); }

    .premium-reports-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; }
    .report-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--panel-border); border-radius: 20px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .report-card:hover { background: var(--panel-hover); transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(124, 58, 237, 0.15); }
    .report-card i { font-size: 2.8rem; margin-bottom: 16px; background: linear-gradient(45deg, var(--primary), var(--secondary)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .report-card h4 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .report-card p { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }

    .social-btn-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .social-link-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: all 0.25s ease; }
    .social-link-btn.whatsapp { background: rgba(16, 185, 129, 0.12); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; }
    .social-link-btn.whatsapp:hover { background: #10b981; color: white; box-shadow: 0 0 12px rgba(16, 185, 129, 0.4); }
    .social-link-btn.facebook { background: rgba(37, 99, 235, 0.12); border: 1px solid rgba(37, 99, 235, 0.3); color: #2563eb; }
    .social-link-btn.facebook:hover { background: #2563eb; color: white; box-shadow: 0 0 12px rgba(37, 99, 235, 0.4); }

    /* تصاميم التبويبات والمعلومات المحدثة */
    .info-badge { display: inline-block; padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 0.9rem; }
    .badge-gold { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
    .badge-green { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }

    .question-detail-item { background: rgba(0,0,0,0.2); padding: 16px; border-radius: 12px; border-right: 4px solid var(--primary); margin-bottom: 12px; transition: transform 0.2s; }
    .question-detail-item:hover { transform: translateX(-5px); background: rgba(0,0,0,0.3); }
    .question-desc { font-size: 0.85rem; color: var(--text-muted); margin-top: 6px; line-height: 1.6; }

    /* تنسيق النوافذ المنبثقة (عالية الوضوح وعديمة الشفافية) */
    .swal-custom-popup {
      background: rgba(7, 15, 33, 0.96) !important;
      border: 1px solid rgba(124, 58, 237, 0.45) !important;
      border-radius: 28px !important;
      color: var(--text-main) !important;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8) !important;
      backdrop-filter: blur(18px) !important;
    }
    .swal2-html-container { margin: 1em 0 0.3em !important; font-family: 'Cairo', sans-serif !important; }
    .swal2-confirm {
      border-radius: 999px !important;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4) !important;
      border: none !important;
      color: #fff !important;
      box-shadow: 0 12px 30px rgba(59,130,246,0.35) !important;
      padding: 10px 24px !important;
    }
    .swal2-cancel {
      border-radius: 999px !important;
      border: 1px solid rgba(255,255,255,0.14) !important;
      background: rgba(255,255,255,0.06) !important;
      color: var(--text-main) !important;
      padding: 10px 24px !important;
    }

  </style>
</head>
<body>

  <div class="top-progress" id="topProgressBar"></div>
  <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

  <div class="app-container">
    <aside class="sidebar" id="mainSidebar">
      <div class="sidebar-header">
        <div class="logo-zone">
          <i class="fa-solid fa-graduation-cap"></i>
          <span class="logo-text">منصة التاج</span>
        </div>
        <button class="collapse-btn" id="toggleSidebarBtn">
          <i class="fa-solid fa-bars-staggered"></i>
        </button>
      </div>
      
      <ul class="nav-tabs">
        <li class="tab-btn active" data-tab="dashboard"><i class="fa-solid fa-chart-line"></i><span class="tab-text">لوحة القيادة</span></li>
        <li class="tab-btn" data-tab="students"><i class="fa-solid fa-users"></i><span class="tab-text">أداء الطلاب</span></li>
        <li class="tab-btn" data-tab="status"><i class="fa-solid fa-trophy"></i><span class="tab-text">حالة الطلاب</span></li>
        <li class="tab-btn" data-tab="lessons"><i class="fa-solid fa-book-open"></i><span class="tab-text">تحليل الدروس</span></li>
        <li class="tab-btn" data-tab="live"><i class="fa-solid fa-bolt"></i><span class="tab-text">الأحداث الحية</span></li>
        <li class="tab-btn" data-tab="forecast"><i class="fa-solid fa-wand-magic-sparkles"></i><span class="tab-text">التنبؤ الذكي</span></li>
        <li class="tab-btn" data-tab="questions"><i class="fa-solid fa-brain"></i><span class="tab-text">الأسئلة المتقدمة</span></li>
        <li class="tab-btn" data-tab="analytics"><i class="fa-solid fa-chart-pie"></i><span class="tab-text">التقارير الشاملة</span></li>
        <li class="tab-btn" data-tab="info"><i class="fa-solid fa-id-card"></i><span class="tab-text">حسابي والباقة</span></li>
      </ul>
    </aside>

    <main class="main-content">
      <header class="toolbar">
        <div class="toolbar-title">
          <h2 id="pageTitle" style="font-weight: 800;">مركز القيادة والتحليلات الذكي</h2>
          <p style="color: var(--text-muted); font-size: 0.85rem;">نظام إدارة ومراقبة أداء منصة التاج - v11 (Firebase Real)</p>
        </div>
        <div class="toolbar-actions">
          <button class="action-btn" id="themeToggleBtn"><i class="fa-solid fa-moon"></i></button>
          <button class="action-btn btn-exit" id="backToPlatformBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> العودة للمنصة</button>
        </div>
      </header>

      <div id="dynamicContent"></div>
    </main>
  </div>



<script type="module">
    // ========== استيرادات النظام الجديد ==========
    import { StatsManager } from './src/stats/StatsManager.js';
    import { StatsCalculator } from './src/stats/core/StatsCalculator.js';
    import { getTeacherPlan } from './src/services/dataService.js';
    import { escapeHtml } from './src/utils.js';

    // ========== استيرادات دوال التحليل والمقارنات ==========
    import { showAdvancedAnalysis, printStudentReport, showGradeSelectionModal, showStudentSelectionModal } from './src/students/analysis.js';
    import { showComparisonModal } from './src/stats/analytics/comparison.js';
    import { exportGradeReport } from './src/stats/analytics/export.js';
    import { getAllGrades, getStudents } from './src/services/dataService.js';

    // ========== المتغيرات العامة ==========
    let realData = null;
    let activeCharts = {};
    let teacherSubscription = null;

    // ========== إنشاء مدير الإحصائيات ==========
    const statsManager = new StatsManager('dynamicContent');

    // ========== تجاوز التحقق من الخطة للمطور ==========
    const DEVELOPER_CODE = "29910141300038";
    const currentTeacherCode = sessionStorage.getItem('peak_teacher_code');
    const isDeveloper = (currentTeacherCode === DEVELOPER_CODE) || sessionStorage.getItem('is_admin') === 'true';

    if (isDeveloper) {
        console.log('[Stats] Developer mode detected – bypassing subscription checks');
        const fakeSubscription = { plan: 'platinum', expiryDate: null };
        localStorage.setItem(`sub_${currentTeacherCode}`, JSON.stringify(fakeSubscription));
        if (typeof window.getTeacherSubscription === 'function') {
            const original = window.getTeacherSubscription;
            window.getTeacherSubscription = (code) => {
                if (code === DEVELOPER_CODE) return fakeSubscription;
                return original(code);
            };
        }
    }

let teacherUnsubscribe = null;

async function subscribeToTeacherPlan(teacherCode, onUpdate) {
    if (teacherUnsubscribe) {
        teacherUnsubscribe();
        teacherUnsubscribe = null;
    }
    try {
        const { db, doc, onSnapshot } = await import('./src/firebase/init.js');
        // نحتاج uid المعلم، لذلك نبحث في teacherCodes أولاً
        const { collection, query, where, getDocs } = await import('./src/firebase/init.js');
        const codesQuery = query(collection(db, 'teacherCodes'), where('code', '==', teacherCode));
        const codesSnap = await getDocs(codesQuery);
        if (codesSnap.empty) {
            onUpdate(null);
            return;
        }
        const uid = codesSnap.docs[0].data().uid;
        const teacherRef = doc(db, 'teachers', uid);
        teacherUnsubscribe = onSnapshot(teacherRef, (docSnap) => {
            if (docSnap.exists()) {
                onUpdate(docSnap.data());
            } else {
                onUpdate(null);
            }
        });
    } catch (err) {
        console.error('خطأ في الاشتراك ببيانات المعلم:', err);
        onUpdate(null);
    }
}

      const today = new Date();

      for (let i = 6; i >= 0; i--) {

        labels.push(d.toLocaleDateString('ar-EG', { weekday: 'short' }));
        const ds = d.toLocaleDateString('en-CA');
        values.push(history.filter(g => new Date(g.timestamp).toLocaleDateString('en-CA') === ds).length);

      container.innerHTML = (realData.recentEvents || []).map(e => `<div class="list-item"><div><i class="fa-solid fa-circle" style="color:var(--success); font-size:0.6rem; margin-left:10px; animation: pulse 2s infinite;"></i> ${e}</div></div>`).join('');
    }

    function attachStudentClickEvents() {
      document.querySelectorAll('.student-card').forEach(card => {
        card.addEventListener('click', async () => {
          const studentId = card.dataset.id;
          if (studentId) await showAdvancedAnalysis(studentId, 'all');
        });
      });
    }

    function attachFilterEvents() {
      const chips = document.querySelectorAll('.filter-chip');
      chips.forEach(chip => {
        chip.addEventListener('click', () => {
          chips.forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          const filter = chip.innerText;
          const cards = document.querySelectorAll('.student-card');
          cards.forEach(card => {
            if (filter === 'جميع الطلاب') card.style.display = '';
            else if (filter.includes('المتفوقين')) {
              const progressBar = card.querySelector('.progress-fill');
              const accuracy = parseInt(progressBar.style.width);
              card.style.display = (accuracy >= 80) ? '' : 'none';
            } else {
              const progressBar = card.querySelector('.progress-fill');
              const accuracy = parseInt(progressBar.style.width);
              card.style.display = (accuracy < 50) ? '' : 'none';
            }
          });
        });
      });
    }

                    <div>مهارة التطبيق: 75%</div><div class="progress-bar"><div style="width:75%; height:6px; background:var(--warning); border-radius:3px;"></div></div>
                    <div>مهارة الاستنتاج: 55%</div><div class="progress-bar"><div style="width:55%; height:6px; background:var(--danger); border-radius:3px;"></div></div>

              <div>

                  <strong style="color:var(--success);">نخبة استيعاب الدرس:</strong>

                  <strong style="color:var(--danger);">الفجوات وضعف الأداء:</strong>

    // ========== دوال التبديل بين التبويبات (معدلة) ==========
async function switchTab(tabId) {
    // التحقق من صلاحية التبويب حسب الخطة
    const teacherPlan = window.teacherPlan || await getTeacherPlan();
    if (teacherPlan === 'free') {
        showFloatingNotification('الباقة المجانية لا تسمح بالوصول إلى التحليلات المتقدمة', 'error');
        return;
    }
    if (teacherPlan === 'silver' && tabId === 'analytics') {
        showFloatingNotification('ميزة التقارير المتقدمة متاحة فقط في الباقة الذهبية', 'error');
        return;
    }
    if (teacherUnsubscribe) {
    teacherUnsubscribe();
    teacherUnsubscribe = null;
}
    simulateProgress(async () => {
        // ... باقي الكود الأصلي لـ switchTab (الذي يحدد المحتوى) ...
        const contentContainer = document.getElementById('dynamicContent');
        if (tabId === 'dashboard') contentContainer.innerHTML = renderDashboard();
        else if (tabId === 'students') contentContainer.innerHTML = renderStudentsTab();
        else if (tabId === 'status') contentContainer.innerHTML = renderStatusTab();
        else if (tabId === 'lessons') contentContainer.innerHTML = renderLessonsTab();
        else if (tabId === 'live') contentContainer.innerHTML = renderLiveTab();
        else if (tabId === 'forecast') contentContainer.innerHTML = renderForecastTab();
        else if (tabId === 'questions') contentContainer.innerHTML = renderQuestionsTab();
        else if (tabId === 'analytics') contentContainer.innerHTML = renderAnalyticsTab();
else if (tabId === 'info') {
    // عرض رسالة تحميل مؤقتاً
    contentContainer.innerHTML = '<div class="glass-panel" style="text-align:center;">جاري تحميل بيانات الاشتراك...</div>';
    const teacherCode = sessionStorage.getItem('peak_teacher_code');
    if (teacherCode) {
        subscribeToTeacherPlan(teacherCode, (teacherData) => {
            renderMyInfoTab(teacherData);
        });
    } else {
        renderMyInfoTab(null);
    }
}        
        if (tabId === 'students') { attachStudentClickEvents(); attachFilterEvents(); }
        else if (tabId === 'lessons') await initLessonsTabContent();
        else if (tabId === 'live') { await initLiveTabContent(); document.getElementById('refreshLiveBtn')?.addEventListener('click', async () => { realData.recentEvents = await StatsCalculator.getRecentEventsOnly(); await initLiveTabContent(); }); }
        
        initTabCharts(tabId);
        
        if (tabId === 'analytics') {
            if (!teacherSubscription) await loadTeacherSubscription();
            // ربط الأحداث كما هو موجود في ملفك الأصلي...
            document.getElementById('parentReportBtn')?.addEventListener('click', async () => {
                if (!isAllowedFeature('gold')) {
                    showFeatureBlockedMessage('تقرير ولي الأمر', 'gold');
                    return;
                }
                const grade = await selectGrade(); if (!grade) return;
                const students = realData.students.filter(s => s.grade === grade);
                if (!students.length) { showFloatingNotification('لا يوجد طلاب مسجلين', 'error'); return; }
                const { value: studentId } = await Swal.fire({ title: 'اختر الطالب', input: 'select', inputOptions: Object.fromEntries(students.map(s=>[s.id, s.name])), showCancelButton: true, customClass: { popup: 'swal-custom-popup' } });
                if (studentId) await printStudentReport(studentId, 'all');
            });
            document.getElementById('advancedAnalysisBtn')?.addEventListener('click', async () => {
                if (!isAllowedFeature('gold')) {
                    showFeatureBlockedMessage('التحليل المتعمق', 'gold');
                    return;
                }
                const studentId = await selectStudent(); if (studentId) await showAdvancedAnalysis(studentId, 'all');
            });
            document.getElementById('compareStudentsBtn')?.addEventListener('click', () => {
                if (!isAllowedFeature('silver')) {
                    showFeatureBlockedMessage('مقارنة الطلاب', 'silver');
                    return;
                }
                showComparisonModal();
            });
            document.getElementById('classReportBtn')?.addEventListener('click', async () => {
                if (!isAllowedFeature('gold')) {
                    showFeatureBlockedMessage('تقرير الصف الكامل', 'gold');
                    return;
                }
                const grade = await selectGrade(); if (grade) await exportGradeReport(grade, { period: 'all' });
            });
        }
        
        gsap.from("#dynamicContent > *", { opacity: 0, y: 15, duration: 0.35, stagger: 0.05 });
    });
}

    async function selectGrade() {
      const grades = await getAllGrades();
      if (!grades.length) { showFloatingNotification('لا توجد صفوف دراسية نشطة', 'error'); return null; }
      const { value: grade } = await Swal.fire({ title: 'اختر الصف', input: 'select', inputOptions: Object.fromEntries(grades.map(g=>[g,g])), showCancelButton: true, customClass: { popup: 'swal-custom-popup' } });
      return grade;
    }

    async function selectStudent() {
      const grade = await selectGrade(); if (!grade) return null;
      const students = realData.students.filter(s => s.grade === grade);
      if (!students.length) { showFloatingNotification('لا يوجد طلاب', 'error'); return null; }
      const { value: studentId } = await Swal.fire({ title: 'اختر الطالب', input: 'select', inputOptions: Object.fromEntries(students.map(s=>[s.id, s.name])), showCancelButton: true, customClass: { popup: 'swal-custom-popup' } });
      return studentId;
    }
    function initGlobalEvents() {
      document.getElementById('toggleSidebarBtn').addEventListener('click', () => {
        document.getElementById('mainSidebar').classList.toggle('collapsed');
      });
      document.getElementById('themeToggleBtn').addEventListener('click', function() {
        const isLight = document.body.classList.toggle('light');
        this.innerHTML = isLight ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
        const activeTab = document.querySelector('.nav-tabs .tab-btn.active').getAttribute('data-tab');
        initTabCharts(activeTab);
      });
      document.getElementById('backToPlatformBtn').addEventListener('click', () => window.location.href = 'platform.html');
      document.querySelectorAll('.nav-tabs .tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.nav-tabs .tab-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          const tabId = this.getAttribute('data-tab');
          document.getElementById('pageTitle').innerText = this.querySelector('.tab-text').innerText;
          switchTab(tabId);
        });
      });
      window.addEventListener('resize', () => {
        Object.keys(activeCharts).forEach(tabKey => {
          activeCharts[tabKey].forEach(chart => chart.resize());
        });
      });
    }

async function start() {
    // التحقق من وجود معلم مسجل
    const teacherCode = sessionStorage.getItem('peak_teacher_code');
    const isTeacher = sessionStorage.getItem('peak_teacher_logged_in') === 'true';
    
    if (!teacherCode || !isTeacher) {
        window.location.href = 'index.html';
        return;
    }

    // ✅ فحص صلاحية الاشتراك (يتطلب خطة فضية على الأقل للدخول إلى صفحة الإحصائيات)
    const { checkTeacherAccess } = await import('./src/services/subscriptionGuard.js');
    const access = await checkTeacherAccess(teacherCode, 'silver');
    if (!access.allowed) {
        Swal.fire({
            title: '🚫 غير مسموح',
            text: access.message,
            icon: 'error',
            confirmButtonText: 'العودة للمنصة',
            background: '#0f172a',
            color: '#fff'
        }).then(() => {
            window.location.href = 'platform.html';
        });
        return;
    }

    // باقي الكود الأصلي لـ start() – نحمله من الملف الأصلي
    // تأكد من أن الكود التالي موجود أصلاً في ملف stats-preview.html
    
    sessionStorage.setItem('peak_teacher_logged_in', 'true');
    
    const teacherPlan = await getTeacherPlan();
    const isFree = teacherPlan === 'free';
    window.teacherPlan = teacherPlan;
    
    if (isFree) {
        document.getElementById('dynamicContent').innerHTML = `
            <div class="glass-panel p-8 text-center" style="max-width: 600px; margin: 50px auto;">
                <div class="text-6xl mb-4">🔒</div>
                <h2 class="text-2xl font-bold text-yellow-400 mb-3">الباقة المجانية</h2>
                <p class="text-gray-300 mb-4">تتضمن الباقة المجانية: إدارة الطلاب (حد أقصى 10)، بنك أسئلة (150 سؤال)، 5 أوضاع لعب.</p>
                <p class="text-yellow-400 mb-4">✨ قم بالترقية للفضية أو الذهبية للوصول إلى لوحة التحليلات المتقدمة وجميع التقارير ✨</p>
                <button onclick="window.location.href='index.html#pricing'" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-6 rounded-full transition">🚀 ترقية الآن</button>
                <div class="mt-6 pt-4 border-t border-white/10"><button id="backToPlatformFromStats" class="text-purple-400 hover:text-purple-300 transition">⬅️ العودة إلى المنصة</button></div>
            </div>
        `;
        document.getElementById('backToPlatformFromStats')?.addEventListener('click', () => window.location.href = 'platform.html');
        return;
    }
    
    await loadTeacherSubscription();
    const initialLoadSuccess = await loadRealStats();
    if (initialLoadSuccess) {
        initGlobalEvents();
        switchTab('dashboard');
    } else {
        document.getElementById('dynamicContent').innerHTML = '<div class="glass-panel" style="text-align:center; color:var(--danger);">⚠️ فشل الاتصال بقواعد البيانات السحابية</div>';
    }
}
start();
  </script>
